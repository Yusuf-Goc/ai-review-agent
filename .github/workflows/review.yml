name: Reusable AI Code Review

on:
  workflow_call:
    inputs:
      scan_mode:
        required: true
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: target-repo

      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: main
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Run PR AI review
        if: ${{ inputs.scan_mode == 'pr' }}
        working-directory: target-repo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python ../ai-review-agent/cli.py --github-pr --retries 4 --retry-delay 3

      - name: Run full repository AI review
        if: ${{ inputs.scan_mode == 'full' }}
        timeout-minutes: 60
        working-directory: target-repo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ../ai-review-agent/cli.py --github-full-scan --retries 1 --retry-delay 2

      - name: Run codebase documentation scan
        if: ${{ inputs.scan_mode == 'docs' }}
        timeout-minutes: 60
        working-directory: target-repo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ../ai-review-agent/cli.py --github-codebase-docs --retries 1 --retry-delay 2

      - name: Commit codebase documentation
        if: ${{ inputs.scan_mode == 'docs' }}
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .ai-review/codebase-summary.json docs/ai-codebase-report.md

          if git diff --cached --quiet; then
            echo "Codebase documentation has no changes."
          else
            git commit -m "Update AI codebase documentation"
            git push
          fi
