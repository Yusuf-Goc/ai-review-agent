name: Reusable AI Code Review

on:
  workflow_call:
    inputs:
      scan_mode:
        required: true
        type: string
      agent_ref:
        description: "AI review agent branch, tag or commit"
        required: false
        type: string
        default: main
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-review:
    if: ${{ inputs.scan_mode == 'pr' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: target-repo

      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: ${{ inputs.agent_ref }}
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Run PR AI review
        working-directory: target-repo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python ../ai-review-agent/cli.py \
            --github-pr \
            --retries 4 \
            --retry-delay 3

  full-repository-scan:
    if: ${{ inputs.scan_mode == 'full' }}

    permissions:
      contents: read
      issues: write

    uses: ./.github/workflows/full-scan.yml

    with:
      agent_ref: ${{ inputs.agent_ref }}

    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  codebase-docs:
    if: ${{ inputs.scan_mode == 'docs' }}

    permissions:
      contents: write

    uses: ./.github/workflows/docs.yml

    with:
      agent_ref: ${{ inputs.agent_ref }}

    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
