name: Reusable AI Code Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: main
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Run AI review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python ai-review-agent/cli.py --github-pr --retries 4 --retry-delay 3
