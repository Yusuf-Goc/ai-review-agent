name: Reusable AI Codebase Documentation

on:
  workflow_call:
    inputs:
      agent_ref:
        description: "AI review agent branch, tag or commit"
        required: false
        type: string
        default: main
    secrets:
      GEMINI_API_KEY:
        required: true

concurrency:
  group: ai-codebase-docs-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      matrix: ${{ steps.metadata.outputs.matrix }}
      shard_count: ${{ steps.metadata.outputs.shard_count }}

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: target-repo

      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: ${{ inputs.agent_ref }}
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Prepare documentation shards
        timeout-minutes: 20
        working-directory: target-repo
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ../ai-review-agent/cli.py \
            --prepare-codebase-docs \
            --docs-output-dir .ai-review/docs-execution

      - name: Export shard matrix
        id: metadata
        working-directory: target-repo
        run: |
          python - <<'PY'
          import json
          import os

          manifest_path = ".ai-review/docs-execution/manifest.json"

          with open(
              manifest_path,
              "r",
              encoding="utf-8",
          ) as manifest_file:
              manifest = json.load(manifest_file)

          matrix = json.dumps(
              manifest["matrix"],
              ensure_ascii=False,
              separators=(",", ":"),
          )

          with open(
              os.environ["GITHUB_OUTPUT"],
              "a",
              encoding="utf-8",
          ) as output_file:
              output_file.write(
                  f"shard_count={manifest['shard_count']}\n"
              )
              output_file.write(f"matrix={matrix}\n")
          PY

      - name: Upload documentation bundle
        uses: actions/upload-artifact@v4
        with:
          name: codebase-docs-bundle
          path: target-repo/.ai-review/docs-execution
          retention-days: 1
          if-no-files-found: error

  codebase-docs-small:
    needs: prepare
    if: ${{ fromJSON(needs.prepare.outputs.shard_count) <= 1 }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: target-repo

      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: ${{ inputs.agent_ref }}
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Run simple codebase documentation scan
        timeout-minutes: 60
        working-directory: target-repo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ../ai-review-agent/cli.py \
            --github-codebase-docs \
            --retries 1 \
            --retry-delay 2

      - name: Commit codebase documentation
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- \
            .ai-review/index.json \
            .ai-review/index.json.bak \
            .ai-review/codebase-summary.json \
            docs/ai-codebase-report.md

          if [ -d .ai-review/summaries ]; then
            git add -A -- .ai-review/summaries
          fi

          if git diff --cached --quiet; then
            echo "Codebase documentation has no changes."
          else
            git commit -m "Update AI codebase documentation"
            git push
          fi

  docs-workers:
    needs: prepare
    if: ${{ fromJSON(needs.prepare.outputs.shard_count) > 1 }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: ${{ inputs.agent_ref }}
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Download documentation bundle
        uses: actions/download-artifact@v4
        with:
          name: codebase-docs-bundle
          path: docs-execution

      - name: Run documentation shard
        timeout-minutes: 45
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p docs-results

          python ai-review-agent/cli.py \
            --run-codebase-docs-shard \
            --docs-payload-file \
              "docs-execution/${{ matrix.payload_file }}" \
            --docs-result-file \
              "docs-results/${{ matrix.shard_id }}.json" \
            --retries 2 \
            --retry-delay 2

      - name: Upload shard result
        uses: actions/upload-artifact@v4
        with:
          name: docs-result-${{ matrix.shard_id }}
          path: docs-results/${{ matrix.shard_id }}.json
          retention-days: 1
          if-no-files-found: error

  docs-merge:
    needs:
      - prepare
      - docs-workers
    if: ${{ always() && needs.prepare.result == 'success' && fromJSON(needs.prepare.outputs.shard_count) > 1 }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: target-repo

      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: ${{ inputs.agent_ref }}
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Download documentation bundle
        uses: actions/download-artifact@v4
        with:
          name: codebase-docs-bundle
          path: target-repo/.ai-review/docs-execution

      - name: Prepare shard results directory
        run: |
          mkdir -p target-repo/.ai-review/docs-results

      - name: Download shard results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: docs-result-*
          path: target-repo/.ai-review/docs-results
          merge-multiple: false

      - name: Merge documentation shard results
        timeout-minutes: 20
        working-directory: target-repo
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ../ai-review-agent/cli.py \
            --merge-codebase-docs-shards \
            --docs-bundle-dir .ai-review/docs-execution \
            --docs-results-dir .ai-review/docs-results

      - name: Commit codebase documentation
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- \
            .ai-review/index.json \
            .ai-review/index.json.bak \
            .ai-review/codebase-summary.json \
            docs/ai-codebase-report.md

          if [ -d .ai-review/summaries ]; then
            git add -A -- .ai-review/summaries
          fi

          if git diff --cached --quiet; then
            echo "Codebase documentation has no changes."
          else
            git commit -m "Update AI codebase documentation"
            git push
          fi
