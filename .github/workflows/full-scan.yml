name: Reusable AI Full Repository Scan

on:
  workflow_call:
    inputs:
      agent_ref:
        description: "AI review agent branch, tag or commit"
        required: false
        type: string
        default: main
    secrets:
      GEMINI_API_KEY:
        required: true

concurrency:
  group: ai-full-scan-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      matrix: ${{ steps.metadata.outputs.matrix }}
      shard_count: ${{ steps.metadata.outputs.shard_count }}

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: target-repo

      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: ${{ inputs.agent_ref }}
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Prepare full scan shards
        timeout-minutes: 20
        working-directory: target-repo
        run: |
          python ../ai-review-agent/cli.py \
            --prepare-full-scan \
            --full-scan-output-dir .ai-review/full-scan-execution

      - name: Export shard matrix
        id: metadata
        working-directory: target-repo
        run: |
          python - <<'PY'
          import json
          import os

          manifest_path = (
              ".ai-review/full-scan-execution/manifest.json"
          )

          with open(
              manifest_path,
              "r",
              encoding="utf-8",
          ) as manifest_file:
              manifest = json.load(manifest_file)

          matrix = json.dumps(
              manifest["matrix"],
              ensure_ascii=False,
              separators=(",", ":"),
          )

          with open(
              os.environ["GITHUB_OUTPUT"],
              "a",
              encoding="utf-8",
          ) as output_file:
              output_file.write(
                  f"shard_count={manifest['shard_count']}\n"
              )
              output_file.write(f"matrix={matrix}\n")
          PY

      - name: Upload full scan bundle
        uses: actions/upload-artifact@v4
        with:
          name: full-scan-bundle
          path: target-repo/.ai-review/full-scan-execution
          retention-days: 1
          if-no-files-found: error

  full-scan-small:
    needs: prepare
    if: ${{ fromJSON(needs.prepare.outputs.shard_count) <= 1 }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: target-repo

      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: ${{ inputs.agent_ref }}
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Run simple full repository scan
        timeout-minutes: 75
        working-directory: target-repo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ../ai-review-agent/cli.py \
            --github-full-scan \
            --full-scan-max-files 0 \
            --retries 3 \
            --retry-delay 3

  full-scan-workers:
    needs: prepare
    if: ${{ fromJSON(needs.prepare.outputs.shard_count) > 1 }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: ${{ inputs.agent_ref }}
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Download full scan bundle
        uses: actions/download-artifact@v4
        with:
          name: full-scan-bundle
          path: full-scan-execution

      - name: Run full scan shard
        timeout-minutes: 75
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p full-scan-results

          python ai-review-agent/cli.py \
            --run-full-scan-shard \
            --full-scan-payload-file \
              "full-scan-execution/${{ matrix.payload_file }}" \
            --full-scan-result-file \
              "full-scan-results/${{ matrix.shard_id }}.json" \
            --retries 3 \
            --retry-delay 3

      - name: Upload shard result
        uses: actions/upload-artifact@v4
        with:
          name: full-scan-result-${{ matrix.shard_id }}
          path: full-scan-results/${{ matrix.shard_id }}.json
          retention-days: 1
          if-no-files-found: error

  full-scan-merge:
    needs:
      - prepare
      - full-scan-workers
    if: ${{ always() && needs.prepare.result == 'success' && fromJSON(needs.prepare.outputs.shard_count) > 1 }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: target-repo

      - name: Checkout AI review agent
        uses: actions/checkout@v4
        with:
          repository: Yusuf-Goc/ai-review-agent
          ref: ${{ inputs.agent_ref }}
          path: ai-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-review-agent/requirements.txt

      - name: Download full scan bundle
        uses: actions/download-artifact@v4
        with:
          name: full-scan-bundle
          path: target-repo/.ai-review/full-scan-execution

      - name: Prepare shard results directory
        run: |
          mkdir -p target-repo/.ai-review/full-scan-results

      - name: Download shard results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: full-scan-result-*
          path: target-repo/.ai-review/full-scan-results
          merge-multiple: false

      - name: Merge full scan shard results
        timeout-minutes: 20
        working-directory: target-repo
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ../ai-review-agent/cli.py \
            --merge-full-scan-shards \
            --full-scan-bundle-dir \
              .ai-review/full-scan-execution \
            --full-scan-results-dir \
              .ai-review/full-scan-results
